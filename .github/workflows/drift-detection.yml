name: 🔍 GitOps Config Drift Detector

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS Region to scan"
        required: false
        default: "ap-south-1"
      fail_on_drift:
        description: "Fail the pipeline if drift is detected?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  push:
    paths:
      - "terraform/**/*.tf"

permissions:
  contents: read
  issues: write

concurrency:
  group: drift-detector
  cancel-in-progress: false

jobs:
  detect-drift:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_REGION: ${{ github.event.inputs.aws_region || 'ap-south-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      TF_STATE_S3_BUCKET: ${{ secrets.TF_STATE_S3_BUCKET }}
      TF_STATE_S3_KEY: ${{ secrets.TF_STATE_S3_KEY || 'terraform.tfstate' }}
      DRIFT_REPORT_PATH: dashboard/drift-report.json
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🏗️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: 🔄 Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_S3_BUCKET" \
            -backend-config="key=$TF_STATE_S3_KEY" \
            -backend-config="region=$AWS_REGION" \
            -input=false
        continue-on-error: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 🔍 Run drift detection
        id: drift
        run: python scripts/drift_detector.py
        continue-on-error: true

      - name: 📊 Generate job summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, sys
          path = os.environ.get("DRIFT_REPORT_PATH", "dashboard/drift-report.json")
          try:
            with open(path) as f:
              report = json.load(f)
          except FileNotFoundError:
            print("No report file found.")
            sys.exit(0)
          drifted = report.get("drifted_resources", 0)
          total   = report.get("total_resources_checked", 0)
          items   = report.get("drift_items", [])
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary, "w") as f:
            if drifted == 0:
              f.write("# ✅ No Config Drift Detected\n\n")
              f.write(f"Scanned **{total}** resource(s) — all match Terraform state.\n")
            else:
              f.write(f"# 🚨 Config Drift Detected in {drifted} Resource(s)\n\n")
              f.write(f"| Stat | Value |\n|---|---|\n")
              f.write(f"| Resources Checked | {total} |\n")
              f.write(f"| Drifted Resources | {drifted} |\n")
              f.write(f"| Total Attributes Drifted | {len(items)} |\n\n")
              f.write("| Resource Type | ID | Attribute | Expected | Actual | Severity |\n")
              f.write("|---|---|---|---|---|---|\n")
              sev_map = {"low":"🟢","medium":"🟡","high":"🟠","critical":"🔴"}
              for it in items:
                sev = sev_map.get(it["severity"],"⚪")
                f.write(f"| `{it['resource_type']}` | `{it['resource_id']}` | "
                        f"`{it['attribute']}` | `{it['expected']}` | `{it['actual']}` | "
                        f"{sev} {it['severity'].upper()} |\n")
          EOF

      - name: 📤 Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: dashboard/drift-report.json
          retention-days: 90

      - name: ❌ Fail if drift detected
        if: steps.drift.outcome == 'failure' && (github.event.inputs.fail_on_drift != 'false')
        run: |
          echo "Drift was detected. Marking pipeline as failed."
          exit 1